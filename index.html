<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Pay - Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>KAI PAY</h1>
                <p>Banking Reimagined</p>
            </div>
            <nav>
                <ul>
                    <li class="active"><a href="index.html">Home</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="balance.html">Balance</a></li>
                    <li><a href="history.html">History</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="welcome">
                <h2>Welcome Back, User</h2>
                <div class="account-summary">
                    <div class="card">
                        <h3>Primary Account</h3>
                        <p class="balance">$12,450.00</p>
                        <p>**** **** **** 4567</p>
                    </div>
                    <div class="quick-actions">
                        <button class="gold-btn">Transfer</button>
                        <button class="gold-btn">Pay Bills</button>
                        <button class="gold-btn">Deposit</button>
                    </div>
                </div>
            </section>

            <section class="recent-transactions">
                <h3>Recent Transactions</h3>
                <div class="transaction-list">
                    <div class="transaction">
                        <p>Amazon Purchase</p>
                        <p class="debit">-$45.99</p>
                    </div>
                    <div class="transaction">
                        <p>Salary Deposit</p>
                        <p class="credit">+$3,500.00</p>
                    </div>
                    <div class="transaction">
                        <p>Netflix Subscription</p>
                        <p class="debit">-$14.99</p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2023 Kai Pay Banking. All rights reserved.</p>
        </footer>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
