<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kai Pay - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.6/dist/htmx.min.js"
        integrity="sha384-Akqfrbj/HpNVo8k11SXBb6TlBWmXXlYQrCSqEWmyKJe+hDm3Z/B2WVG4smwBkRVm"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>KAI PAY</h1>
                <p>Banking Reimagined</p>
            </div>
            <nav hx-boost="true">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li class="active"><a href="profile.html">Profile</a></li>
                    <li><a href="balance.html">Balance</a></li>
                    <li><a href="history.html">History</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="profile-section">
                <h2>My Profile</h2>
                <div class="profile-card">
                    <div class="profile-pic">
                        <div class="initials">KP</div>
                    </div>
                    <div class="profile-info">
                        <p><strong>Name:</strong> Kai Pay User</p>
                        <p><strong>Email:</strong> user@kaipay.com</p>
                        <p><strong>Phone:</strong> (555) 123-4567</p>
                        <p><strong>Member Since:</strong> January 2022</p>
                    </div>
                </div>

                <div class="security-settings">
                    <h3>Security Settings</h3>
                    <button class="gold-btn">Change Password</button>
                    <button class="gold-btn">Two-Factor Authentication</button>
                    <button class="gold-btn">Update Security Questions</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2023 Kai Pay Banking. All rights reserved.</p>
        </footer>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
